name: Build and Deploy to Appetize

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build for simulator
        run: |
          xcodebuild \
            -scheme WindDown \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" 2>&1

      - name: Locate .app bundle
        id: locate_app
        run: |
          APP_PATH=$(find DerivedData -name "WindDown.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"

      - name: Zip .app bundle
        run: |
          cd "$(dirname "${{ steps.locate_app.outputs.APP_PATH }}")"
          zip -r WindDown.app.zip WindDown.app
          echo "ZIP_PATH=$(pwd)/WindDown.app.zip" >> $GITHUB_ENV

      - name: Upload to Appetize
        id: appetize
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.appetize.io/v1/apps/wsto7vecvvzewjv6dwdga5h3zu" \
            -u "$APPETIZE_API_TOKEN:" \
            -F "file=@$ZIP_PATH" \
            -F "platform=ios")
          echo "Appetize response: $RESPONSE"
          PUBLIC_URL=$(echo "$RESPONSE" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('publicURL', ''))")
          echo "Live URL: $PUBLIC_URL"

      - name: Upload .app.zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindDown-simulator
          path: ${{ env.ZIP_PATH }}
          retention-days: 14
