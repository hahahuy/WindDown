name: WindDown
options:
  bundleIdPrefix: com.winddown
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  TARGETED_DEVICE_FAMILY: "1"
  SUPPORTS_MACCATALYST: "NO"
  INFOPLIST_FILE: WindDown/Resources/Info.plist

targets:
  WindDown:
    type: application
    platform: iOS
    sources:
      - path: WindDown
        excludes:
          - "**/*.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.winddown.app
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
    entitlements: WindDown/Resources/WindDown.entitlements
    dependencies: []
    scheme:
      testTargets:
        - WindDownTests

  WindDownTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/WindDownTests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.winddown.tests
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WindDown.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/WindDown"
    dependencies:
      - target: WindDown
